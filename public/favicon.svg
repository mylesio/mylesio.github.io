<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f0f11"/>
  <!-- Chrome Dino T-Rex pixel art, simplified for 32x32 favicon -->
  <g fill="#7dd3fc">
    <!-- head -->
    <rect x="18" y="4" width="10" height="2"/>
    <rect x="18" y="6" width="10" height="2"/>
    <rect x="24" y="6" width="2" height="2" fill="#0f0f11"/><!-- eye -->
    <rect x="18" y="8" width="10" height="2"/>
    <rect x="18" y="10" width="8" height="2"/>
    <!-- neck/body -->
    <rect x="14" y="10" width="4" height="2"/>
    <rect x="12" y="12" width="10" height="2"/>
    <rect x="10" y="14" width="12" height="2"/>
    <rect x="8" y="16" width="14" height="2"/>
    <rect x="8" y="18" width="12" height="2"/>
    <!-- arm -->
    <rect x="18" y="14" width="2" height="2"/>
    <rect x="20" y="16" width="2" height="2"/>
    <!-- tail -->
    <rect x="6" y="18" width="2" height="2"/>
    <rect x="4" y="16" width="2" height="2"/>
    <rect x="2" y="14" width="2" height="2"/>
    <!-- legs -->
    <rect x="10" y="20" width="4" height="2"/>
    <rect x="10" y="22" width="2" height="2"/>
    <rect x="8" y="24" width="2" height="2"/>
    <rect x="16" y="20" width="4" height="2"/>
    <rect x="18" y="22" width="2" height="2"/>
    <rect x="20" y="24" width="2" height="2"/>
  </g>
</svg>
