<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0f0f11"/>

  <!-- glow layer: breathes slowly -->
  <polyline points="9,8 23,16 9,24"
            stroke="#7dd3fc" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity"
             values="0.05;0.18;0.18;0.05"
             keyTimes="0;0.45;0.55;1"
             dur="2.8s"
             repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.6 1; 0 0 1 1; 0.4 0 0.6 1"/>
  </polyline>

  <!-- main chevron: subtle brightness shift in sync -->
  <polyline points="9,8 23,16 9,24"
            stroke="#7dd3fc" stroke-width="3.5"
            stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity"
             values="0.72;1;1;0.72"
             keyTimes="0;0.45;0.55;1"
             dur="2.8s"
             repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.6 1; 0 0 1 1; 0.4 0 0.6 1"/>
  </polyline>
</svg>
