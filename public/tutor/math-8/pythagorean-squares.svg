<svg viewBox="-60 -30 380 340" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,sans-serif">
  <!-- c² square on hypotenuse AC (A=80,230  C=200,110) -->
  <!-- AC vector=(120,-120), perp outward=(-120,-120), A+perp=(-40,110), C+perp=(80,-10) -->
  <polygon points="80,230 200,110 80,-10 -40,110" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="18" y="118" text-anchor="middle" fill="#4c1d95" font-weight="700" font-size="15">c²</text>

  <!-- a² square on bottom leg AB (A=80,230  B=200,230), extends downward -->
  <rect x="80" y="230" width="120" height="70" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="140" y="272" text-anchor="middle" fill="#92400e" font-weight="700" font-size="15">a²</text>

  <!-- b² square on right leg BC (B=200,230  C=200,110), extends rightward -->
  <rect x="200" y="110" width="70" height="120" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="235" y="177" text-anchor="middle" fill="#065f46" font-weight="700" font-size="15">b²</text>

  <!-- right triangle on top -->
  <polygon points="80,230 200,230 200,110" fill="#fffbf5" stroke="#f97316" stroke-width="2.5"/>
  <!-- right angle mark -->
  <path d="M190,230 L190,220 L200,220" fill="none" stroke="#f97316" stroke-width="1.5"/>

  <!-- edge labels inside triangle -->
  <text x="140" y="222" text-anchor="middle" fill="#c2410c" font-weight="700" font-size="13">a</text>
  <text x="192" y="175" text-anchor="end" fill="#065f46" font-weight="700" font-size="13">b</text>
  <text x="152" y="170" text-anchor="middle" fill="#4c1d95" font-weight="700" font-size="13">c</text>
</svg>
