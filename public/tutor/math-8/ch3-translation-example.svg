<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 -20 260 200" width="260" height="200">
  <!-- Axes -->
  <line x1="-20" y1="0" x2="200" y2="0" stroke="#9ca3af" stroke-width="1"/>
  <line x1="0" y1="170" x2="0" y2="-10" stroke="#9ca3af" stroke-width="1"/>
  <!-- Grid hints -->
  <text x="205" y="4" font-family="sans-serif" font-size="11" fill="#9ca3af">x</text>
  <text x="3" y="-13" font-family="sans-serif" font-size="11" fill="#9ca3af">y</text>
  <!-- Scale marks -->
  <text x="38" y="12" font-family="sans-serif" font-size="9" fill="#9ca3af">1</text>
  <text x="78" y="12" font-family="sans-serif" font-size="9" fill="#9ca3af">2</text>
  <text x="118" y="12" font-family="sans-serif" font-size="9" fill="#9ca3af">3</text>
  <!-- Original triangle ABC: A(1,1), B(3,1), C(2,3) → scale 40px per unit -->
  <!-- A(40,120) B(120,120) C(80,40) (y flipped: y_svg = 160-y*40) -->
  <polygon points="40,120 120,120 80,40" fill="#bfdbfe" stroke="#3b82f6" stroke-width="2" opacity="0.8"/>
  <text x="32" y="136" font-family="serif" font-size="13" fill="#1d4ed8">A</text>
  <text x="122" y="136" font-family="serif" font-size="13" fill="#1d4ed8">B</text>
  <text x="80" y="33" font-family="serif" font-size="13" fill="#1d4ed8">C</text>
  <!-- Translated triangle A'B'C': A'(-1,0), B'(1,0), C'(0,2) -->
  <!-- A'(-40,160) B'(40,160) C'(0,80) -->
  <polygon points="-40,160 40,160 0,80" fill="#fed7aa" stroke="#ea580c" stroke-width="2" opacity="0.8"/>
  <text x="-55" y="174" font-family="serif" font-size="13" fill="#c2410c">A'</text>
  <text x="43" y="174" font-family="serif" font-size="13" fill="#c2410c">B'</text>
  <text x="3" y="76" font-family="serif" font-size="13" fill="#c2410c">C'</text>
  <!-- Arrows showing translation -->
  <line x1="40" y1="120" x2="-40" y2="160" stroke="#6b7280" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>
