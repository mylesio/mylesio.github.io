<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" width="280" height="160">
  <polygon points="50,130 180,130 230,30 100,30" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <!-- diagonals -->
  <line x1="50" y1="130" x2="230" y2="30" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="180" y1="130" x2="100" y2="30" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- center O -->
  <circle cx="140" cy="80" r="3" fill="#d97706"/>
  <text x="145" y="78" font-family="serif" font-size="13" fill="#92400e">O</text>
  <!-- labels -->
  <text x="36" y="145" font-family="serif" font-size="14" fill="#92400e">A</text>
  <text x="183" y="145" font-family="serif" font-size="14" fill="#92400e">B</text>
  <text x="233" y="26" font-family="serif" font-size="14" fill="#92400e">C</text>
  <text x="85" y="26" font-family="serif" font-size="14" fill="#92400e">D</text>
  <!-- equal marks on diagonals -->
  <text x="82" y="102" font-family="sans-serif" font-size="11" fill="#b45309">|</text>
  <text x="190" y="60" font-family="sans-serif" font-size="11" fill="#b45309">|</text>
</svg>
