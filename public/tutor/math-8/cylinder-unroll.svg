<svg viewBox="0 0 260 180" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13">
  <!-- 展开后的长方形 -->
  <rect x="30" y="30" width="80" height="120" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- 标注：宽=周长 -->
  <line x1="30" y1="165" x2="110" y2="165" stroke="#10b981" stroke-width="1.5"/>
  <line x1="30" y1="160" x2="30" y2="170" stroke="#10b981" stroke-width="1.5"/>
  <line x1="110" y1="160" x2="110" y2="170" stroke="#10b981" stroke-width="1.5"/>
  <text x="70" y="177" text-anchor="middle" fill="#065f46" font-weight="700">周长 = 0.4m</text>

  <!-- 标注：高 -->
  <line x1="15" y1="30" x2="15" y2="150" stroke="#06b6d4" stroke-width="1.5"/>
  <line x1="10" y1="30" x2="20" y2="30" stroke="#06b6d4" stroke-width="1.5"/>
  <line x1="10" y1="150" x2="20" y2="150" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="8" y="95" text-anchor="middle" fill="#0e7490" font-weight="700">高</text>
  <text x="8" y="110" text-anchor="middle" fill="#0e7490" font-size="11">2.55m</text>

  <!-- A 点（左下角） -->
  <circle cx="30" cy="150" r="5" fill="#f97316"/>
  <text x="22" y="148" text-anchor="end" fill="#c2410c" font-weight="700">A</text>

  <!-- B' 点（右上角，绕半圈） -->
  <circle cx="110" cy="30" r="5" fill="#7c3aed"/>
  <text x="118" y="34" text-anchor="start" fill="#4c1d95" font-weight="700">B'</text>

  <!-- 最短路径（直线） -->
  <line x1="30" y1="150" x2="110" y2="30" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="85" y="105" text-anchor="start" fill="#4c1d95" font-weight="700">≈2.56m</text>

  <!-- 箭头说明 -->
  <text x="155" y="60" fill="#475569" font-size="12">展开后</text>
  <text x="155" y="78" fill="#475569" font-size="12">直线 = 最短</text>
  <text x="155" y="96" fill="#475569" font-size="12">路径</text>

  <!-- 圆柱示意（右侧） -->
  <ellipse cx="195" cy="130" rx="25" ry="8" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <ellipse cx="195" cy="60" rx="25" ry="8" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="170" y1="60" x2="170" y2="130" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="220" y1="60" x2="220" y2="130" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- 螺旋路径示意 -->
  <path d="M170,130 Q195,95 220,60" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="4,2"/>
  <text x="195" y="148" text-anchor="middle" fill="#475569" font-size="11">圆柱</text>
</svg>
