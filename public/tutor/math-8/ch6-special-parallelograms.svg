<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 170" width="280" height="170">
  <!-- Rectangle -->
  <rect x="15" y="20" width="70" height="50" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <rect x="15" y="20" width="10" height="10" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="35" y="82" font-family="sans-serif" font-size="11" fill="#1e40af" text-anchor="middle">矩形</text>
  <!-- Rhombus -->
  <polygon points="130,20 160,55 130,90 100,55" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="130" y="105" font-family="sans-serif" font-size="11" fill="#15803d" text-anchor="middle">菱形</text>
  <!-- Square -->
  <rect x="195" y="20" width="60" height="60" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <rect x="195" y="20" width="10" height="10" fill="none" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="225" y="97" font-family="sans-serif" font-size="11" fill="#a16207" text-anchor="middle">正方形</text>
  <!-- Legend -->
  <text x="140" y="140" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">正方形 ⊂ 矩形，菱形 ⊂ 平行四边形</text>
  <!-- Diagonal lines for square -->
  <line x1="195" y1="20" x2="255" y2="80" stroke="#ca8a04" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="255" y1="20" x2="195" y2="80" stroke="#ca8a04" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Diagonal lines for rhombus -->
  <line x1="130" y1="20" x2="130" y2="90" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="100" y1="55" x2="160" y2="55" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
