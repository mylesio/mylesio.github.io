<svg viewBox="0 0 220 200" width="100%" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13">
  <!-- 网（顶部横线） -->
  <line x1="20" y1="30" x2="200" y2="30" stroke="#94a3b8" stroke-width="2"/>
  <text x="110" y="22" text-anchor="middle" fill="#64748b" font-size="12">网</text>

  <!-- 二传位置 -->
  <circle cx="130" cy="55" r="6" fill="#06b6d4" stroke="#0e7490" stroke-width="1.5"/>
  <text x="145" y="59" fill="#0e7490" font-size="12">二传（网前偏右 4.5m）</text>

  <!-- 垂直距离线（你到二传的纵向分量） -->
  <line x1="85" y1="55" x2="85" y2="155" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="64" y="110" text-anchor="middle" fill="#c2410c" font-weight="700" font-size="13">6m</text>

  <!-- 水平距离线 -->
  <line x1="85" y1="155" x2="130" y2="155" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="107" y="171" text-anchor="middle" fill="#065f46" font-weight="700" font-size="13">4.5m</text>

  <!-- 你的位置 -->
  <circle cx="85" cy="155" r="6" fill="#f97316" stroke="#c2410c" stroke-width="1.5"/>
  <text x="45" y="158" text-anchor="middle" fill="#c2410c" font-size="12">你（5号位）</text>

  <!-- 传球距离（斜线） -->
  <line x1="85" y1="155" x2="130" y2="55" stroke="#7c3aed" stroke-width="2"/>
  <text x="98" y="100" text-anchor="end" fill="#4c1d95" font-weight="700" font-size="13">d=7.5m</text>

  <!-- 直角标记 -->
  <path d="M85,145 L95,145 L95,155" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
</svg>
