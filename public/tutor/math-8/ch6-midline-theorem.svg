<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180" width="260" height="180">
  <!-- Main triangle -->
  <polygon points="130,20 30,160 230,160" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <!-- Midpoints D on AB, E on AC -->
  <circle cx="80" cy="90" r="3" fill="#ef4444"/>
  <circle cx="180" cy="90" r="3" fill="#ef4444"/>
  <!-- Midline DE -->
  <line x1="80" y1="90" x2="180" y2="90" stroke="#ef4444" stroke-width="2.5"/>
  <!-- Labels -->
  <text x="125" y="14" font-family="serif" font-size="14" fill="#15803d">A</text>
  <text x="16" y="170" font-family="serif" font-size="14" fill="#15803d">B</text>
  <text x="232" y="170" font-family="serif" font-size="14" fill="#15803d">C</text>
  <text x="62" y="88" font-family="serif" font-size="13" fill="#dc2626">D</text>
  <text x="185" y="88" font-family="serif" font-size="13" fill="#dc2626">E</text>
  <!-- DE label -->
  <text x="118" y="85" font-family="sans-serif" font-size="11" fill="#dc2626" text-anchor="middle">DE</text>
  <!-- BC label -->
  <text x="130" y="175" font-family="sans-serif" font-size="11" fill="#15803d" text-anchor="middle">BC = 2×DE</text>
  <!-- Tick marks showing midpoints -->
  <line x1="100" y1="50" x2="107" y2="55" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="155" y1="50" x2="162" y2="55" stroke="#16a34a" stroke-width="1.5"/>
</svg>
