<!DOCTYPE html>
<html>
<head><title>FPS Test</title></head>
<body style="margin:0;background:#111">
<canvas id="c" style="display:block"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
c.width = window.innerWidth;
c.height = window.innerHeight;

let frames = 0, last = performance.now(), fps = 0;

function tick(ts) {
  requestAnimationFrame(tick);
  frames++;
  if (ts - last >= 500) {
    fps = Math.round(frames * 1000 / (ts - last));
    frames = 0; last = ts;
  }
  ctx.clearRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#222'; ctx.fillRect(0, 0, c.width, c.height);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(fps + ' fps', c.width/2, c.height/2);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('pure requestAnimationFrame — no DOM', c.width/2, c.height/2 + 48);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
